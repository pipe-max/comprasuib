<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel de Contabilidad — Unión Israelita de Beneficencia">
    <meta name="theme-color" content="#0c84ff">
    <link rel="icon" href="assets/logo-uib.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/logo-uib.png">
    <title>Contabilidad UIB — Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.22">
</head>

<body>
    <div class="glass-bg"></div>

    <!-- Toast container para notificaciones -->
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <!-- Mobile menu toggle -->
    <button class="mobile-menu-toggle" id="menu-toggle" aria-label="Abrir menú de navegación">
        <span></span><span></span><span></span>
    </button>
    <!-- Overlay para cerrar sidebar en móvil -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <img src="assets/logo-uib.png" alt="Logo UIB" class="login-logo">
            <h1 class="login-title">Contabilidad UIB</h1>
            <p class="login-subtitle">Panel de Contabilidad</p>
            <p class="login-info">Inicia sesión con tu cuenta institucional</p>
            <button id="btn-google-login" class="btn-google-login">
                <svg class="google-icon" viewBox="0 0 24 24" width="22" height="22">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Iniciar sesión con Google
            </button>
            <div id="login-error" class="login-error" style="display:none;"></div>
            <div class="login-domains">
                <p>Acceso restringido</p>
                <span>Solo correos institucionales autorizados</span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="Navegación principal">
            <div class="logo">
                <img src="assets/logo-uib.png" alt="Logo Unión Israelita de Beneficencia" width="45" height="45">
                <h2>Contabilidad</h2>
            </div>

            <nav>
                <button class="nav-item active" data-view="dashboard" aria-current="page">
                    <span class="nav-icon">📊</span> Panel General
                </button>
                <button class="nav-item" data-view="new-request">
                    <span class="nav-icon">➕</span> Nueva Solicitud
                </button>
                <button class="nav-item" data-view="evidence">
                    <span class="nav-icon">📸</span> Evidencias
                </button>
                <button class="nav-item" data-view="providers">
                    <span class="nav-icon">🏢</span> Proveedores
                </button>
                <button class="nav-item" data-view="metricas">
                    <span class="nav-icon">📈</span> Métricas
                </button>
                <button class="nav-item" data-view="inventory">
                    <span class="nav-icon">📦</span> Inventario
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-backup-btns">
                    <button class="sidebar-btn" onclick="window.exportBackup()" title="Descargar backup">💾 Backup</button>
                    <button class="sidebar-btn" onclick="document.getElementById('import-backup').click()" title="Importar backup">📥 Importar</button>
                    <input type="file" id="import-backup" hidden accept=".json" onchange="window.importBackup(this.files[0])">
                </div>
                <p>v2.25 — Unión Israelita de Beneficencia</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="content" role="main">
            <header class="top-bar">
                <h1 id="view-title">Panel General</h1>
                <div class="user-profile">
                    <img id="user-avatar-img" class="avatar-img" src="" alt="" style="display:none;">
                    <div id="user-avatar-fallback" class="avatar" aria-hidden="true">AG</div>
                    <span id="user-display-name" class="user-name">Administrador</span>
                    <button id="btn-logout" class="btn-logout" title="Cerrar sesión">🚪</button>
                </div>
            </header>

            <div id="view-dashboard" class="view-container">
                <!-- Se genera dinámicamente por renderView('dashboard') -->
            </div>
        </main>
    </div>

    <!-- Bottom Navigation (móvil) -->
    <nav class="mobile-bottom-nav" id="mobile-bottom-nav" aria-label="Navegación inferior">
        <button class="bnav-item active" data-view="dashboard">
            <span class="bnav-icon"><svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg></span>
            <span class="bnav-label">Panel</span>
        </button>
        <button class="bnav-item" data-view="metricas">
            <span class="bnav-icon"><svg viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg></span>
            <span class="bnav-label">Métricas</span>
        </button>
        <button class="bnav-item bnav-create" data-view="new-request">
            <span class="bnav-icon"><svg viewBox="0 0 24 24"><path d="M12 5v14m-7-7h14"/></svg></span>
            <span class="bnav-label">Nueva</span>
        </button>
        <button class="bnav-item" data-view="inventory">
            <span class="bnav-icon"><svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></span>
            <span class="bnav-label">Inventario</span>
        </button>
        <button class="bnav-item" id="bnav-more-btn">
            <span class="bnav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></span>
            <span class="bnav-label">Más</span>
        </button>
    </nav>
    <div class="bnav-more-overlay" id="bnav-more-overlay"></div>
    <div class="bnav-more-menu" id="bnav-more-menu">
        <button class="bnav-more-item" data-view="providers"><svg viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0H5m14 0h2m-16 0H3m2-9h.01M12 12h.01M12 8h.01M8 8h.01M16 8h.01M8 16h.01M12 16h.01M16 16h.01M16 12h.01M8 12h.01"/></svg> Proveedores</button>
        <button class="bnav-more-item" data-view="evidence"><svg viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="14" r="3"/></svg> Evidencias</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="inventory.js?v=2.17"></script>
    <script src="app.js?v=2.25"></script>
</body>

</html>
