<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel de control de compras — Colegio Theodoro Herzl">
    <meta name="theme-color" content="#0c84ff">
    <link rel="icon" href="assets/logo-cth.png" type="image/png">
    <title>CTH Compras — Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glass-bg"></div>

    <!-- Toast container para notificaciones -->
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <!-- Mobile menu toggle -->
    <button class="mobile-menu-toggle" id="menu-toggle" aria-label="Abrir menú de navegación">
        <span></span><span></span><span></span>
    </button>
    <!-- Overlay para cerrar sidebar en móvil -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="Navegación principal">
            <div class="logo">
                <img src="assets/logo-cth.png" alt="Logo Colegio Theodoro Herzl" width="45" height="45">
                <h2>Compras</h2>
            </div>

            <nav>
                <button class="nav-item active" data-view="dashboard" aria-current="page">
                    <span class="nav-icon">📊</span> Panel General
                </button>
                <button class="nav-item" data-view="new-request">
                    <span class="nav-icon">➕</span> Nueva Solicitud
                </button>
                <button class="nav-item" data-view="history">
                    <span class="nav-icon">📂</span> Historial
                </button>
                <button class="nav-item" data-view="providers">
                    <span class="nav-icon">🏢</span> Proveedores
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-backup-btns">
                    <button class="sidebar-btn" onclick="window.exportBackup()" title="Descargar backup">💾 Backup</button>
                    <button class="sidebar-btn" onclick="document.getElementById('import-backup').click()" title="Importar backup">📥 Importar</button>
                    <input type="file" id="import-backup" hidden accept=".json" onchange="window.importBackup(this.files[0])">
                </div>
                <p>v2.1 — Colegio Theodoro Herzl</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="content" role="main">
            <header class="top-bar">
                <h1 id="view-title">Panel General</h1>
                <div class="user-profile">
                    <div class="avatar" aria-hidden="true">AG</div>
                    <span class="user-name">Administrador</span>
                </div>
            </header>

            <div id="view-dashboard" class="view-container">
                <!-- Se genera dinámicamente por renderView('dashboard') -->
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
